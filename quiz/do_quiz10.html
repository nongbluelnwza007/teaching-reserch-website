<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>แบบทดสอบ หน่วยที่ 10 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', 'TH Sarabun PSK', sans-serif; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-image: radial-gradient(#1e293b 1px, transparent 1px); 
            background-size: 30px 30px; 
            color: #0f172a; 
        }
        .quiz-container-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 600px; border: 4px solid #0ea5e9; transition: 0.3s; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .quiz-title { margin: 0; font-size: 24px; font-weight: 700; }
        .progress-text { color: #64748b; font-size: 18px; font-weight: bold; }
        
        .question-box { font-size: 22px; font-weight: 700; margin-bottom: 20px; line-height: 1.6; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .option-item { padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .option-item:hover { border-color: #0ea5e9; background: #f0f9ff; }
        .option-item.selected { border-color: #0ea5e9; background: #0ea5e9; color: white; font-weight: bold; }
        
        .quiz-footer { display: flex; justify-content: space-between; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-back { background: #64748b; color: white; }
        .btn-next { background: #0ea5e9; color: white; }
        .btn-next:disabled { background: #cbd5e1; cursor: not-allowed; color: #94a3b8; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 320px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }

        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-confirm:hover { background: #ca8a04; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-cancel:hover { background: #475569; }

                /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .quiz-container-box {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .question-box {
                font-size: 18px !important;
                margin-bottom: 15px !important;
                line-height: 1.5 !important;
            }
            .option-item {
                font-size: 16px !important;
                padding: 12px 15px !important;
            }
            .btn {
                font-size: 16px !important;
                padding: 10px 20px !important;
            }
            .modal-content {
                width: 90% !important;
                padding: 20px !important;
            }
        }
    </style>
</head>
<body>

    <div class="quiz-container-box" id="quizMainBox">
        <div class="quiz-header">
            <h2 class="quiz-title" id="quiz-header-title">แบบทดสอบ หน่วยที่ 10</h2>
            <span class="progress-text" id="progress-track">ข้อที่ 0/0</span>
        </div>

        <div>
            <div class="question-box" id="question-text">คำถามกำลังโหลด...</div>
            <div class="options-list" id="options-container"></div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-back" onclick="cancelQuiz()">ยกเลิก</button>
            <button class="btn btn-next" id="nextBtn" disabled>ถัดไป</button>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="auth-icon" style="font-size:70px; display:block; margin-bottom:15px;">❌</span>
            <h2 id="auth-title">สิทธิ์เข้าทำข้อสอบถูกบล็อก</h2>
            <p id="auth-text" style="font-size: 20px; margin-bottom: 25px; color: #475569; line-height: 1.6;">กำลังตรวจสอบสิทธิ์...</p>
            
            <div class="modal-btn-group" id="modalBtnGroup">
                <button class="btn btn-next" id="auth-modal-btn" onclick="window.location.href='../quiz.html'" style="width: 100%;">กลับหน้าเลือกบทเรียน</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf", measurementId: "G-52HK2DB5XS" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        if (!loginUser) { window.location.href = '../login.html'; }

        const currentUnit = 10; // 📍 ระบุหน่วยที่ 10
        const selectedType = localStorage.getItem('activeQuizType') || 'pre';
        const typeLabel = selectedType === 'pre' ? 'ก่อนเรียน' : 'หลังเรียน';

        // ชุดคำถาม 10 ข้อ เจาะลึกเนื้อหาหน่วยที่ 10 การบำรุงรักษาและการปรับปรุงระบบ
        const quizQuestions = [
            { q: "1. การจัดระเบียบสายไฟภายในเคสคอมพิวเตอร์ (Cable Management) มีประโยชน์สูงสุดในด้านวิศวกรรมฮาร์ดแวร์อย่างไร?", อาศัย: ["ช่วยเพิ่มพื้นที่กักเก็บของ SSD", "ลดการทำงานของซอฟต์แวร์ระบบ", "ป้องกันการเกิด Dead Zone สะสมความร้อน และช่วยกระจายทิศทางลม (Airflow)", "เร่งสัญญาณบัสพัดลมระบบ"], a: 2 },
            { q: "2. หากต้องการทำความสะอาดคราบออกไซด์บนหน้าสัมผัสของพอร์ต HDMI ควรเลือกใช้สารเคมีประเภทใดเพื่อป้องกันปัญหาสัญญาณขาดหาย?", อาศัย: ["น้ำมันจักรทั่วไป", "Contact Cleaner สูตร Non-residue (ระเหยแห้งทันทีไม่ทิ้งคราบ)", "แอลกอฮอล์ผสมน้ำเข้มข้น", "น้ำยาล้างจานทั่วไป"], a: 1 },
            { q: "3. ชุดคำสั่งใดของ Windows ที่ช่างคอมพิวเตอร์นิยมใช้ตรวจสอบและซ่อมแซมความเสถียรของไฟล์ระบบที่เสียหายอัตโนมัติ?", อาศัย: ["chkdsk /f /r", "sfc /scannow", "Export-WindowsDriver", "diskpart > clean"], a: 1 },
            { q: "4. เหตุใดสถาปัตยกรรมการดูแลระบบจึงระบุข้อห้ามในการรันกระบวนการ Defragmentation บนสื่อเก็บข้อมูลประเภท SSD?", อาศัย: ["ทำให้ความจุข้อมูลลดลง 10MB", "เป็นระบบที่ทำงานได้เฉพาะ Ring 3", "เป็นการสร้าง Write Cycles โดยไม่จำเป็น ส่งผลให้เซลล์ข้อมูลใน SSD เสื่อมสภาพและพังเร็วขึ้น", "ทำให้เกิดช่องโหว่ระดับมัลแวร์ Rootkit"], a: 2 },
            { q: "5. การเพิ่มความลื่นไหลให้เนื้อที่ใน Drive C: หายไปโดยไม่จำเป็น ช่างคอมพิวเตอร์ควรลบไฟล์ขยะตกค้างในโฟลเดอร์ใด?", อาศัย: ["C:\\Program Files", "C:\\Windows\\SoftwareDistribution\\Download", "C:\\Windows\\System32", "C:\\Users\\AppData\\Local"], a: 1 },
            { q: "6. วิธีการสำรองข้อมูลระบบปฏิบัติการคอมพิวเตอร์ทั้งลูกรวมถึงโปรแกรมและการตั้งค่าต่างๆ พร้อมกัน (Snapshot) เรียกว่าอะไร?", อาศัย: ["Click-to-Run Backup", "System Image Backup", "Intelligent Volume Copy", "Driver Backup Utilities"], a: 1 },
            { q: "7. กลยุทธ์การสำรองข้อมูลระดับสากลที่มีประสิทธิภาพสูงสุดตามกฎ '3-2-1 Rule' ข้อใดกล่าวได้ถูกต้องที่สุด?", อาศัย: ["สำรองข้อมูล 1 ชุด ไว้ในคอมพิวเตอร์เครื่องหลัก", "มีข้อมูล 3 ชุด ในสื่อเก็บข้อมูล 2 รูปแบบ และต้องมี 1 ชุดเก็บไว้ Offsite (แยกต่างหาก)", "เก็บไฟล์งานไว้ในแฟลชไดรฟ์อย่างเดียว 3 อัน", "สำรองข้อมูลทุกๆ 3 วัน สลับกับล้างประวัติแคช 1 ครั้ง"], a: 1 },
            { q: "8. หากต้องการแก้ไขปัญหาเครื่องคอมพิวเตอร์ทำงานอืดอาดหรือค้างเนื่องจากปัญหาคอขวด (Performance Bottleneck) โดยระบบยังใช้ HDD เป็นไดรฟ์หลัก ขั้นตอนแรกที่คุ้มค่าที่สุดคืออะไร?", อาศัย: ["เปลี่ยนพัดลมระบายความร้อนตัวใหม่", "อัปเกรดเปลี่ยนย้ายดิสก์ระบบไปใช้ SSD (SATA หรือ NVMe)", "ซื้อคีย์บอร์ดเกมมิ่งอันใหม่", "ลงชื่อ активи บัญชี Office เพิ่มเติม"], a: 1 },
            { q: "9. วัตถุประสงค์หลักในการรันกระบวนการอัปเดตข้อมูล BIOS เพื่อติดตั้งระบบแก้ช่องโหว่ความปลอดภัยระดับฮาร์ดแวร์คืออะไร?", อาศัย: ["ล้างไดรเวอร์ตกค้างเก่าออกจากเครื่อง", "แก้ไขและป้องกันภัยช่องโหว่ความปลอดภัยฮาร์ดแวร์ เช่น Spectre และ Meltdown", "เพิ่มแบนด์วิดท์ในการรับส่งข้อมูลเพิ่มเท่าตัว", "ช่วยเร่งระดับความร้อนให้ CPU ทำงานได้นิ่งขึ้น"], a: 1 },
            { q: "10. เครื่องมือใดที่จำเป็นต้องนำมาใช้ถอนรากถอนโคนล้างไฟล์ไดรเวอร์เก่า (Driver Clean Install) ป้องกันปัญหาไฟล์ DLL ทับซ้อนกันก่อนลงไดรเวอร์ใหม่?", อาศัย: ["Device Manager", "DDU (Display Driver Uninstaller)", "services.msc", "PowerShell Core"], a: 1 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswer = null;

        document.getElementById('quiz-header-title').innerText = `แบบทดสอบ${typeLabel} หน่วยที่ ${currentUnit}`;
        document.getElementById('quizMainBox').style.borderColor = selectedType === 'pre' ? '#f59e0b' : '#10b981';

        async function checkAccessSecurity() {
            if (selectedType === 'post') {
                try {
                    const docSnap = await db.collection("users").doc(loginUser).get();
                    let passed = false;
                    
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        const unitData = data.scores ? data.scores["unit" + currentUnit] : null;
                        if (unitData && unitData.pre !== undefined && unitData.pre !== null && unitData.pre !== 0) {
                            passed = true;
                        }
                    }

                    if (!passed) {
                        document.getElementById('modalBtnGroup').innerHTML = `<button class="btn btn-next" onclick="window.location.href='../quiz.html'" style="width: 100%;">กลับหน้าเลือกบทเรียน</button>`;
                        document.getElementById('auth-icon').innerText = "❌";
                        document.getElementById('auth-icon').style.color = "#ef4444";
                        document.getElementById('auth-title').innerText = "สิทธิ์เข้าทำข้อสอบถูกบล็อก";
                        document.getElementById('auth-text').innerText = "นายต้องทำแบบทดสอบก่อนเรียน (Pre-Test) ของหน่วยที่ 10 ให้ผ่านและได้คะแนนมากกว่า 0 ก่อน จึงจะทำหลังเรียนได้!";
                        document.getElementById('auth-modal').style.display = 'flex';
                        return; 
                    }
                } catch (e) {
                    console.error(e);
                }
            }
            showQuestion();
        }

        function showQuestion() {
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.disabled = true;
            selectedAnswer = null;
            nextBtn.innerText = currentQuestionIndex === quizQuestions.length - 1 ? "ส่งข้อสอบ" : "ถัดไป";
            
            const currentQuestion = quizQuestions[currentQuestionIndex];
            document.getElementById('progress-track').innerText = `ข้อที่ ${currentQuestionIndex + 1}/${quizQuestions.length}`;
            document.getElementById('question-text').innerText = currentQuestion.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            currentQuestion.อาศัย.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerText = option;
                div.onclick = () => {
                    document.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedAnswer = index;
                    nextBtn.disabled = false;
                };
                container.appendChild(div);
            });
        }

        document.getElementById('nextBtn').addEventListener('click', async () => {
            if (selectedAnswer === quizQuestions[currentQuestionIndex].a) score++;

            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                await saveScore();
            }
        });

        async function saveScore() {
            const finalPercentage = Math.round((score / quizQuestions.length) * 100);
            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                
                let currentScores = {};
                if (docSnap.exists && docSnap.data().scores) {
                    currentScores = docSnap.data().scores;
                }

                if (!currentScores["unit" + currentUnit]) {
                    currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                }
                
                currentScores["unit" + currentUnit][selectedType] = finalPercentage;
                await userDocRef.update({ scores: currentScores });

                document.getElementById('modalBtnGroup').innerHTML = `<button class="btn btn-next" onclick="window.location.href='../quiz.html'" style="width: 100%;">กลับหน้าเลือกบทเรียน</button>`;
                document.getElementById('auth-icon').innerText = "🎉";
                document.getElementById('auth-icon').style.color = "#10b981";
                document.getElementById('auth-title').innerText = "บันทึกคะแนนเสร็จสิ้น!";
                document.getElementById('auth-text').innerHTML = `แบบทดสอบ<b>${typeLabel}</b> หน่วยที่ ${currentUnit}<br>ได้คะแนน: <b>${score} / ${quizQuestions.length}</b> ข้อ (${finalPercentage}%)`;
                document.getElementById('auth-modal').style.display = 'flex';
            } catch (e) {
                alert("ระบบขัดข้อง แต่นายทำได้ " + score + " คะแนน!");
                window.location.href = '../quiz.html';
            }
        }

        window.cancelQuiz = () => {
            const modal = document.getElementById('auth-modal');
            const icon = document.getElementById('auth-icon');
            const title = document.getElementById('auth-title');
            const text = document.getElementById('auth-text');
            const btnGroup = document.getElementById('modalBtnGroup');

            icon.innerText = "❓";
            icon.style.color = "#eab308"; 
            title.innerText = "ต้องการยกเลิกใช่ไหม?";
            text.innerText = "หากกดยืนยันการยกเลิกการทำข้อสอบในครั้งนี้ คะแนนปัจจุบันของนายจะไม่ถูกบันทึกลงในระบบ!";

            btnGroup.innerHTML = `
                <button class="modal-btn-confirm" onclick="window.location.href='../quiz.html'">ยืนยันยกเลิก</button>
                <button class="modal-btn-cancel" onclick="closeCancelModal()">ทำข้อสอบต่อ</button>
            `;

            modal.style.display = 'flex';
        };

        window.closeCancelModal = () => {
            document.getElementById('auth-modal').style.display = 'none';
        };

        checkAccessSecurity();
    </script>
</body>
</html>
