<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมแบบฝึกหัด หน่วยที่ 6 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .game-container { background: white; padding: 35px; border-radius: 25px; width: 850px; border: 4px solid #3b82f6; color: #0f172a; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 25px; text-align: left; }
        
        /* สไตล์ตู้สล็อตแมชชีนตัวเบิ้ม */
        .slot-machine { display: flex; gap: 15px; justify-content: center; margin: 30px 0; background: #1e293b; padding: 25px; border-radius: 20px; border: 4px solid #475569; }
        .slot-column { flex: 1; background: #0f172a; border: 3px solid #3b82f6; border-radius: 15px; padding: 20px; color: #38bdf8; font-size: 20px; font-weight: 700; min-height: 90px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; user-select: none; }
        .slot-column:hover { background: #1e1b4b; border-color: #6366f1; color: #818cf8; }

        .game-btn { padding: 12px 28px; border: none; border-radius: 10px; font-weight: 700; font-size: 18px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .btn-cancel-main { background: #64748b; color: white; }
        .btn-submit-main { background: #10b981; color: white; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); color: #0f172a; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; }
        .modal-btn-single { width: 100%; padding: 12px; background: #10b981; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; }
    
                /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .game-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .card-grid, .drop-grid {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }
            .item-pool {
                padding: 10px !important;
                gap: 8px !important;
            }
            .drag-item {
                font-size: 14px !important;
                padding: 8px 12px !important;
            }
            .drop-zone {
                min-height: 120px !important;
                padding: 12px !important;
            }
            .drop-title {
                font-size: 16px !important;
            }
            .memory-card {
                height: 80px !important;
                font-size: 13px !important;
                padding: 5px !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2 style="margin:0; font-size:24px;">🎮 เกมสล็อตแมชชีนจัดคู่สถาปัตยกรรม OS</h2>
            <span style="font-weight:700; font-size:22px; color:#3b82f6;" id="scoreTrack">เป้าหมาย: คู่อัญมณีความปลอดภัย Windows 11</span>
        </div>
        <p style="color:#475569; font-weight:700; font-size:17px; margin-bottom:10px; text-align: left;">วิธีเล่น: คลิกที่แต่ละกล่องวงล้อเพื่อสลับเปลี่ยนข้อความ ปรับแต่งสล็อตให้ตรงเงื่อนไขความเข้ากันได้ของระบบ Windows 11 อิงตามหลักสถาปัตยกรรมระดับฮาร์ดแวร์ให้สมบูรณ์แบบ!</p>
        
        <div class="slot-machine">
            <div class="slot-column" id="slot0" onclick="rotateSlot(0)">กำลังโหลด...</div>
            <div class="slot-column" id="slot1" onclick="rotateSlot(1)">กำลังโหลด...</div>
            <div class="slot-column" id="slot2" onclick="rotateSlot(2)">กำลังโหลด...</div>
        </div>

        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button class="game-btn btn-cancel-main" onclick="cancelGame()">ยกเลิกเกม</button>
            <button class="game-btn btn-submit-main" onclick="finishGame()">ตรวจสอบวงล้อสล็อต</button>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:70px; display:block; margin-bottom:15px;">❓</span>
            <h2 id="modal-title" style="margin:0 0 10px 0; font-size:24px; font-weight:700;">แจ้งเตือน</h2>
            <p id="modal-text" style="font-size:18px; color:#475569; margin-bottom:25px; line-height:1.6;"></p>
            <div class="modal-btn-group" id="modalBtnGroup"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        const currentUnit = 6;

        // ข้อมูลตัวเลือกในตู้สล็อตแต่ละแถว
        const slotOptions = [
            ["ระบบ Windows 10", "ระบบ Windows 11", "ระบบ DOS Legacy"],
            ["ตารางดิสก์ MBR", "ตารางดิสก์ GPT", "ตารางดิสก์ FAT32 Hybrid"],
            ["ชิปความปลอดภัย TPM 2.0 + Secure Boot", "สิทธิ์เลเยอร์ User Mode (Ring 3)", "ระบบควบคุมสติปัญญา CSM"]
        ];

        let currentIndices = [0, 0, 0];

        function updateDisplay() {
            document.getElementById('slot0').innerText = slotOptions[0][currentIndices[0]];
            document.getElementById('slot1').innerText = slotOptions[1][currentIndices[1]];
            document.getElementById('slot2').innerText = slotOptions[2][currentIndices[2]];
        }

        function rotateSlot(colIdx) {
            currentIndices[colIdx] = (currentIndices[colIdx] + 1) % slotOptions[colIdx].length;
            updateDisplay();
        }

        async function finishGame() {
            // เงื่อนไขชนะที่เมคเซนส์: Windows 11 (Index 1) + GPT (Index 1) + TPM 2.0 (Index 0)
            let isWin = currentIndices[0] === 1 && currentIndices[1] === 1 && currentIndices[2] === 0;
            let finalPercent = isWin ? 100 : 0;

            if (!isWin) {
                showModal("❌", "การจัดชุดสล็อตผิดพลาด!", "ตรรกะชุดสถาปัตยกรรมความปลอดภัยยังขัดแย้งกันอยู่ ! Windows 11 บังคับใช้ระบบดิสก์และกุญแจเข้ารหัสแบบไหน ลองทบทวนแล้วสลับวงล้อดูใหม่!", null);
                return;
            }

            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                let currentScores = docSnap.exists && docSnap.data().scores ? docSnap.data().scores : {};
                if (!currentScores["unit" + currentUnit]) currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                currentScores["unit" + currentUnit].exercise = finalPercent;
                await userDocRef.update({ scores: currentScores });

                showModal("🎉", "สล็อตแมชชีนเข้าล็อก!", "ปลดล็อกสิทธิ์แมชชิ่งโครงสร้างเสร็จสมบูรณ์ ได้คะแนนแบบฝึกหัด: <b>100% เต็ม!</b>", () => {
                    window.location.href = '../index.html';
                }, true);
            } catch(e) { window.location.href = '../index.html'; }
        }

        window.cancelGame = () => {
            showModal("❓", "ต้องการยกเลิกใช่ไหม?", "หากกดยืนยันออกจากเกม ความคืบหน้าของบทเรียนนี้จะไม่ถูกบันทึกนะ !", () => { window.location.href = '../index.html'; });
        };

        function showModal(icon, title, text, action, isSingleBtn = false) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const btnGroup = document.getElementById('modalBtnGroup');
            if(isSingleBtn) {
                btnGroup.innerHTML = `<button class="modal-btn-single">ตกลงกลับหน้าหลัก</button>`;
                btnGroup.firstChild.onclick = action;
            } else {
                btnGroup.innerHTML = `
                    <button class="modal-btn-confirm" id="modalConfirm">ยืนยัน</button>
                    <button class="modal-btn-cancel" onclick="document.getElementById('game-modal').style.display='none'">ทำต่อ</button>
                `;
                if(action) document.getElementById('modalConfirm').onclick = action;
            }
            document.getElementById('game-modal').style.display = 'flex';
        }

        updateDisplay();
    </script>
</body>
</html>
