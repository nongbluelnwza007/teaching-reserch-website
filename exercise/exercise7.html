<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมแบบฝึกหัด หน่วยที่ 7 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .game-container { background: white; padding: 35px; border-radius: 25px; width: 850px; border: 4px solid #3b82f6; color: #0f172a; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 25px; }
        
        /* แผงตารางควบคุม */
        .app-list-table { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .app-row { background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 12px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .app-row.disabled-state { background: #fee2e2; border-color: #f87171; }
        .app-name-tag { font-size: 16px; font-weight: 700; color: #1e293b; }
        
        .toggle-btn { padding: 8px 18px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
        .btn-status-on { background: #10b981; color: white; }
        .btn-status-off { background: #ef4444; color: white; }

        .game-btn { padding: 12px 28px; border: none; border-radius: 10px; font-weight: 700; font-size: 18px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .btn-cancel-main { background: #64748b; color: white; }
        .btn-submit-main { background: #10b981; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); color: #0f172a; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; }
        .modal-btn-single { width: 100%; padding: 12px; background: #10b981; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; }
    
            /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .game-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .card-grid, .drop-grid {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }
            .item-pool {
                padding: 10px !important;
                gap: 8px !important;
            }
            .drag-item {
                font-size: 14px !important;
                padding: 8px 12px !important;
            }
            .drop-zone {
                min-height: 120px !important;
                padding: 12px !important;
            }
            .drop-title {
                font-size: 16px !important;
            }
            .memory-card {
                height: 80px !important;
                font-size: 13px !important;
                padding: 5px !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2 style="margin:0; font-size:24px;">🎮 เกมแผงสวิตช์กวาดล้างซอฟต์แวร์ขยะแฝง (Bloatware Audit)</h2>
            <span style="font-weight:700; font-size:22px; color:#3b82f6;">โหมดล้างบาง</span>
        </div>
        <p style="color:#475569; font-weight:700; font-size:16px; margin-bottom:20px;">วิธีเล่น: จงกดยกเลิกสั่ง "ปิดสิทธิ์ (OFF)" เฉพาะโปรแกรมขยะแถบพ่วงที่ไร้ประโยชน์ และ "เปิดสิทธิ์ (ON)" จงรักษาโปรแกรม Driver ระดับแกนหลักของเครื่องคอมพิวเตอร์เอาไว้ให้มั่น!</p>
        
        <div class="app-list-table" id="appTable"></div>

        <div style="display:flex; justify-content:space-between;">
            <button class="game-btn btn-cancel-main" onclick="cancelGame()">ยกเลิกเกม</button>
            <button class="game-btn btn-submit-main" onclick="verifyCleanup()">รันระบบล้างข้อมูล</button>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:70px; display:block; margin-bottom:15px;">❓</span>
            <h2 id="modal-title" style="margin:0 0 10px 0; font-size:24px; font-weight:700;">แจ้งเตือน</h2>
            <p id="modal-text" style="font-size:18px; color:#475569; margin-bottom:25px; line-height:1.6;"></p>
            <div class="modal-btn-group" id="modalBtnGroup"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        const currentUnit = 7;

        // ดาต้ารายชื่อซอฟต์แวร์แฝงผสมไดรเวอร์
        let appsData = [
            { name: "Realtek Audio Driver Core (ไดรเวอร์ระบบเสียง)", isTrash: false, currentOn: true },
            { name: "KTCM Browser Toolbar Ext (แถบเครื่องมือโฆษณาแฝง)", isTrash: true, currentOn: true },
            { name: "NVIDIA Display Driver Engine (ไดรเวอร์ระบบการ์ดจอ)", isTrash: false, currentOn: true },
            { name: "Super Cleaner Optimizer Plus (โปรแกรมหลอกลวงกินทรัพยากร)", isTrash: true, currentOn: true },
            { name: "Intel Chipset Storage Driver (ไดรเวอร์คุมแผงเมนบอร์ด)", isTrash: false, currentOn: true },
            { name: "Free PDF Converter Search helper (มัลแวร์แฝงเบราว์เซอร์)", isTrash: true, currentOn: true }
        ];

        function renderTable() {
            const container = document.getElementById('appTable');
            container.innerHTML = '';
            appsData.forEach((app, idx) => {
                const row = document.createElement('div');
                row.className = `app-row ${!app.currentOn ? 'disabled-state' : ''}`;
                row.innerHTML = `
                    <span class="app-name-tag">${app.name}</span>
                    <button class="toggle-btn ${app.currentOn ? 'btn-status-on' : 'btn-status-off'}" onclick="toggleApp(${idx})">
                        ${app.currentOn ? '🟢 เปิดสิทธิ์ (ON)' : '🔴 ปิดสิทธิ์ (OFF)'}
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function toggleApp(idx) {
            appsData[idx].currentOn = !appsData[idx].currentOn;
            renderTable();
        }

        async function verifyCleanup() {
            let correctCount = 0;
            appsData.forEach(app => {
                // คะแนนเต็มได้เมื่อ: ขยะต้องปิด (isTrash && !currentOn) และ ไดรเวอร์ต้องเปิด (!isTrash && currentOn)
                if (app.isTrash && !app.currentOn) correctCount++;
                if (!app.isTrash && app.currentOn) correctCount++;
            });

            const finalPercent = Math.round((correctCount / appsData.length) * 100);

            if (finalPercent < 100) {
                showModal("❌", "ล้างระบบล้มเหลว!", "สั่งปิดสิทธิ์สุ่มสี่สุ่มห้า ดันไปปิดไดรเวอร์แกนหลัก หรือปล่อยให้แอปขยะเล็ดรอดทำงานอยู่ ! ทบทวนดูดีๆ หน้าที่ของแต่ละตัวคืออะไร!", null);
                return;
            }

            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                let currentScores = docSnap.exists && docSnap.data().scores ? docSnap.data().scores : {};
                if (!currentScores["unit" + currentUnit]) currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                currentScores["unit" + currentUnit].exercise = finalPercent;
                await userDocRef.update({ scores: currentScores });

                showModal("🎉", "ล้างคลีนเสร็จสมบูรณ์!", "ล้างบางระบบ Bloatware ปลอดภัยไร้ริ้วรอย ได้คะแนนแบบฝึกหัด: <b>100% เต็ม!</b>", () => {
                    window.location.href = '../index.html';
                }, true);
            } catch(e) { window.location.href = '../index.html'; }
        }

        window.cancelGame = () => {
            showModal("❓", "ต้องการยกเลิกใช่ไหม?", "หากกดยืนยันออกจากเกม ความคืบหน้าของบทเรียนนี้จะไม่ถูกบันทึกนะ !", () => { window.location.href = '../index.html'; });
        };

        function showModal(icon, title, text, action, isSingleBtn = false) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const btnGroup = document.getElementById('modalBtnGroup');
            if(isSingleBtn) {
                btnGroup.innerHTML = `<button class="modal-btn-single">ตกลงกลับหน้าหลัก</button>`;
                btnGroup.firstChild.onclick = action;
            } else {
                btnGroup.innerHTML = `
                    <button class="modal-btn-confirm" id="modalConfirm">ยืนยัน</button>
                    <button class="modal-btn-cancel" onclick="document.getElementById('game-modal').style.display='none'">ทำต่อ</button>
                `;
                if(action) document.getElementById('modalConfirm').onclick = action;
            }
            document.getElementById('game-modal').style.display = 'flex';
        }

        renderTable();
    </script>
</body>
</html>
