<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>เกมแบบฝึกหัด หน่วยที่ 4 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .game-container { background: white; padding: 35px; border-radius: 25px; width: 850px; border: 4px solid #3b82f6; color: #0f172a; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 25px; }
        
        .sort-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .sort-item { background: #f8fafc; border: 2px solid #cbd5e1; padding: 12px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 16px; }
        .arrow-box { display: flex; gap: 5px; }
        .arrow-btn { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .arrow-btn:hover { background: #2563eb; }

        .game-btn { padding: 12px 28px; border: none; border-radius: 10px; font-weight: 700; font-size: 18px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .btn-cancel-main { background: #64748b; color: white; }
        .btn-submit-main { background: #10b981; color: white; }

        /* 📍 กล่องยกเครื่องสเปกโมดอลปุ่มคู่น่ามอง */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); color: #0f172a; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-confirm:hover { background: #ca8a04; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-cancel:hover { background: #475569; }
        .modal-btn-single { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-single:hover { background: #2563eb; }

                /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .game-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .card-grid, .drop-grid {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }
            .item-pool {
                padding: 10px !important;
                gap: 8px !important;
            }
            .drag-item {
                font-size: 14px !important;
                padding: 8px 12px !important;
            }
            .drop-zone {
                min-height: 120px !important;
                padding: 12px !important;
            }
            .drop-title {
                font-size: 16px !important;
            }
            .memory-card {
                height: 80px !important;
                font-size: 13px !important;
                padding: 5px !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2 style="margin:0; font-size:24px;">🎮 เกมจัดเรียงลำดับขั้นตอนกระบวนการประกอบคอมพิวเตอร์</h2>
            <span style="font-weight:700; font-size:22px; color:#3b82f6;">สายเซียนคอม</span>
        </div>
        <p style="color:#475569; font-weight:700; font-size:16px; margin-bottom:20px;">จงกดปุ่มลูกศรเพื่อสลับตำแหน่งข้อความ ให้เรียงลำดับกระบวนการประกอบจาก "ขั้นตอนแรกสุด" ลงไปหา "ท้ายสุด" ให้ถูกต้อง :</p>
        
        <div class="sort-list" id="sortListContainer"></div>

        <div style="display:flex; justify-content:space-between;">
            <button class="game-btn btn-cancel-main" onclick="cancelGame()">ยกเลิกเกม</button>
            <button class="game-btn btn-submit-main" onclick="finishGame()">ส่งผลพัซเซิลขั้นตอน</button>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:70px; display:block; margin-bottom:15px;">❓</span>
            <h2 id="modal-title" style="margin:0 0 10px 0; font-size:24px; font-weight:700;">แจ้งเตือน</h2>
            <p id="modal-text" style="font-size:18px; color:#475569; margin-bottom:25px; line-height:1.6;"></p>
            <div class="modal-btn-group" id="modalBtnGroup"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        const currentUnit = 4;

        let currentSteps = [
            { id: 2, text: "แต้มทาซิลิโคนความร้อนขนาดเท่าเมล็ดถั่วเขียวลงตรงกลางกระดองหน้าสัมผัส CPU" },
            { id: 0, text: "หมุนติดตั้งหมุดทองเหลือง Standoff เข้ากับแผงเคสโลหะเพื่อรองป้องกันลายวงจรช็อต" },
            { id: 3, text: "ยึดแผ่นเมนบอร์ดหลักลงล็อกล็อกน็อตโครงสร้างเคสคอมพิวเตอร์ให้แน่นหนา" },
            { id: 1, text: "สังเกตเครื่องหมายรูปแบบสามเหลี่ยมมุมล่างแล้ววางกระจายตัว CPU ลงบนล็อก Socket บอร์ด" }
        ];

        function renderList() {
            const container = document.getElementById('sortListContainer');
            container.innerHTML = '';
            currentSteps.forEach((step, idx) => {
                const item = document.createElement('div');
                item.className = 'sort-item';
                item.innerHTML = `
                    <span>${step.text}</span>
                    <div class="arrow-box">
                        <button class="arrow-btn" onclick="moveItem(${idx}, -1)">🔼</button>
                        <button class="arrow-btn" onclick="moveItem(${idx}, 1)">🔽</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function moveItem(idx, direction) {
            let targetIdx = idx + direction;
            if (targetIdx < 0 || targetIdx >= currentSteps.length) return;
            let temp = currentSteps[idx];
            currentSteps[idx] = currentSteps[targetIdx];
            currentSteps[targetIdx] = temp;
            renderList();
        }

        async function finishGame() {
            let matchCount = 0;
            currentSteps.forEach((step, idx) => { if (step.id === idx) matchCount++; });
            const finalPercent = Math.round((matchCount / currentSteps.length) * 100);
            
            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                let currentScores = docSnap.exists && docSnap.data().scores ? docSnap.data().scores : {};
                if (!currentScores["unit" + currentUnit]) currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                currentScores["unit" + currentUnit].exercise = finalPercent;
                await userDocRef.update({ scores: currentScores });

                showModal("🎉", "วิเคราะห์พัซเซิลเสร็จสิ้น!", `บันทึกความสมบูรณ์กระบวนการประกอบเรียบร้อย<br>ได้คะแนน : <b>${finalPercent}%</b>`, () => { window.location.href = '../index.html'; }, true);
            } catch(e) { window.location.href = '../index.html'; }
        }

        window.cancelGame = () => {
            showModal("❓", "ต้องการยกเลิกใช่ไหม?", "หากกดยืนยันออกจากเกม ผังความคืบหน้าการประกอบบอร์ดบทเรียนนี้จะไม่ถูกเซฟนะ !", () => { window.location.href = '../index.html'; });
        };

        function showModal(icon, title, text, action, isSingleBtn = false) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const btnGroup = document.getElementById('modalBtnGroup');
            if(isSingleBtn) {
                btnGroup.innerHTML = `<button class="modal-btn-single" style="background:#10b981;">ตกลงกลับหน้าหลัก</button>`;
                btnGroup.firstChild.onclick = action;
            } else {
                btnGroup.innerHTML = `
                    <button class="modal-btn-confirm" id="modalConfirm">ยืนยันยกเลิก</button>
                    <button class="modal-btn-cancel" onclick="document.getElementById('game-modal').style.display='none'">เล่นต่อ</button>
                `;
                document.getElementById('modalConfirm').onclick = action;
            }
            document.getElementById('game-modal').style.display = 'flex';
        }
        renderList();
    </script>
</body>
</html>
