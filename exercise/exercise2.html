<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>เกมแบบฝึกหัด หน่วยที่ 2 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .game-container { background: white; padding: 35px; border-radius: 25px; width: 850px; border: 4px solid #3b82f6; color: #0f172a; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 25px; }
        
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .memory-card { background: #1e293b; color: white; height: 120px; border-radius: 15px; display: flex; justify-content: center; align-items: center; text-align: center; padding: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; user-select: none; border: 2px solid #334155; }
        .memory-card.flipped { background: #3b82f6; color: white; border-color: #60a5fa; }
        .memory-card.matched { background: #10b981; color: white; border-color: #34d399; cursor: default; }
        
        .game-btn { padding: 12px 28px; border: none; border-radius: 10px; font-weight: 700; font-size: 18px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .btn-cancel-main { background: #64748b; color: white; }
        .btn-submit-main { background: #10b981; color: white; }
        .btn-submit-main:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

        /* 📍 หน้าตาดีไซน์โมดอลควบคุมปุ่มคู่ทรงสวย */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); color: #0f172a; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-confirm:hover { background: #ca8a04; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-cancel:hover { background: #475569; }
        .modal-btn-single { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-single:hover { background: #2563eb; }

                /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .game-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .card-grid, .drop-grid {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }
            .item-pool {
                padding: 10px !important;
                gap: 8px !important;
            }
            .drag-item {
                font-size: 14px !important;
                padding: 8px 12px !important;
            }
            .drop-zone {
                min-height: 120px !important;
                padding: 12px !important;
            }
            .drop-title {
                font-size: 16px !important;
            }
            .memory-card {
                height: 80px !important;
                font-size: 13px !important;
                padding: 5px !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2 style="margin:0; font-size:24px;">🎮 เกมจับคู่การ์ดความจำคัดแยกชิ้นส่วนภายใน</h2>
            <span style="font-weight:700; font-size:22px; color:#3b82f6;" id="scoreTrack">คะแนน: 0</span>
        </div>
        <p style="color:#475569; font-weight:700; font-size:16px; margin-bottom:20px;">จงคลิกหงายการ์ดเพื่อจับคู่ "ชื่ออุปกรณ์" กับ "หน้าที่การทำงานระดับโครงสร้าง" ให้ถูกต้องครบถ้วน:</p>
        
        <div class="card-grid" id="cardGrid"></div>

        <div style="display:flex; justify-content:space-between;">
            <button class="game-btn btn-cancel-main" onclick="cancelGame()">ยกเลิกเกม</button>
            <button id="submitGameBtn" class="game-btn btn-submit-main" onclick="finishGame()" disabled>ส่งผลแบบฝึกหัด (0/6 คู่)</button>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:70px; display:block; margin-bottom:15px;">❓</span>
            <h2 id="modal-title" style="margin:0 0 10px 0; font-size:24px; font-weight:700;">แจ้งเตือน</h2>
            <p id="modal-text" style="font-size:18px; color:#475569; margin-bottom:25px; line-height:1.6;"></p>
            <div class="modal-btn-group" id="modalBtnGroup"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        const currentUnit = 2;
        let matchedPairs = 0;
        let flippedCards = [];
        let lockBoard = false;
        let gameScore = 100;

        const dataSource = [
            { id: 1, text: "ชิปเซ็ต PCH" }, { id: 1, text: "คุมการจราจรข้อมูลรวมบนบอร์ดทดแทนชิปเหนือ-ใต้" },
            { id: 2, text: "แผงวงจร VRM" }, { id: 2, text: "แปลงและคุมกระแสไฟให้เรียบเนียนส่งเข้า CPU" },
            { id: 3, text: "SSD NVMe M.2" }, { id: 3, text: "จัดเก็บข้อมูลผ่านชิป NAND Flash บนโปรโตคอล PCIe" },
            { id: 4, text: "หน่วยความจำหลัก RAM" }, { id: 4, text: "เก็บข้อมูลชั่วคราวแบบ Volatile ไฟดับหายหมด" },
            { id: 5, text: "ชิป ROM BIOS" }, { id: 5, text: "เก็บเฟิร์มแวร์ระบบพื้นฐาน บอร์ดจะตายถ้าชิปนี้พัง" },
            { id: 6, text: "มาตรฐาน 80 Plus" }, { id: 6, text: "ชี้วัดประสิทธิภาพการแปลงพลังงานของแหล่งจ่ายไฟ PSU" }
        ];

        function initGame() {
            const grid = document.getElementById('cardGrid');
            const shuffled = dataSource.sort(() => Math.random() - 0.5);
            shuffled.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.id = data.id;
                card.dataset.index = index;
                card.innerText = "❓ คลิกเพื่อหงาย";
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this.classList.contains('flipped') || this.classList.contains('matched')) return;
            this.classList.add('flipped');
            this.innerText = dataSource[this.dataset.index].text;
            flippedCards.push(this);
            if (flippedCards.length === 2) { checkMatch(); }
        }

        function checkMatch() {
            let isMatch = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
            if (isMatch) {
                flippedCards[0].classList.add('matched');
                flippedCards[1].classList.add('matched');
                matchedPairs++;
                document.getElementById('submitGameBtn').innerText = `ส่งผลแบบฝึกหัด (${matchedPairs}/6 คู่)`;
                document.getElementById('scoreTrack').innerText = `คะแนน: ${Math.round((matchedPairs/6)*100)}`;
                resetTurn();
                if (matchedPairs === 6) { document.getElementById('submitGameBtn').disabled = false; }
            } else {
                lockBoard = true;
                gameScore = Math.max(10, gameScore - 10);
                setTimeout(() => {
                    flippedCards[0].classList.remove('flipped');
                    flippedCards[1].classList.remove('flipped');
                    flippedCards[0].innerText = "❓ คลิกเพื่อหงาย";
                    flippedCards[1].innerText = "❓ คลิกเพื่อหงาย";
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() { flippedCards = []; lockBoard = false; }

        async function finishGame() {
            const finalPercent = Math.round((matchedPairs / 6) * 100);
            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                let currentScores = docSnap.exists && docSnap.data().scores ? docSnap.data().scores : {};
                if (!currentScores["unit" + currentUnit]) currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                currentScores["unit" + currentUnit].exercise = finalPercent;
                await userDocRef.update({ scores: currentScores });

                showModal("🎉", "บันทึกคะแนนเสร็จสิ้น!", `ผ่านเกมจับคู่ชิ้นส่วนภายในเรียบร้อย<br>ได้คะแนน: <b>${finalPercent}%</b>`, () => { window.location.href = '../index.html'; }, true);
            } catch(e) { window.location.href = '../index.html'; }
        }

        window.cancelGame = () => {
            showModal("❓", "ต้องการยกเลิกใช่ไหม?", "หากกดยืนยันออกจากเกม ความคืบหน้าของบทเรียนนี้จะไม่ถูกบันทึกนะ !", () => { window.location.href = '../index.html'; });
        };

        function showModal(icon, title, text, action, isSingleBtn = false) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const btnGroup = document.getElementById('modalBtnGroup');
            if(isSingleBtn) {
                btnGroup.innerHTML = `<button class="modal-btn-single" style="background:#10b981;">ตกลงกลับหน้าหลัก</button>`;
                btnGroup.firstChild.onclick = action;
            } else {
                btnGroup.innerHTML = `
                    <button class="modal-btn-confirm" id="modalConfirm">ยืนยันยกเลิก</button>
                    <button class="modal-btn-cancel" onclick="document.getElementById('game-modal').style.display='none'">เล่นต่อ</button>
                `;
                document.getElementById('modalConfirm').onclick = action;
            }
            document.getElementById('game-modal').style.display = 'flex';
        }
        initGame();
    </script>
</body>
</html>
