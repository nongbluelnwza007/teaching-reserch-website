<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมแบบฝึกหัด หน่วยที่ 3 - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .game-container { background: white; padding: 35px; border-radius: 25px; width: 850px; border: 4px solid #3b82f6; color: #0f172a; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .game-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 25px; }
        
        .quest-box { background: #f8fafc; border: 2px solid #cbd5e1; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .options-column { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .spec-option { background: white; padding: 15px 20px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; text-align: left; }
        .spec-option:hover { border-color: #3b82f6; background: #f0f9ff; }
        .spec-option.selected { background: #3b82f6; color: white; border-color: #2563eb; }

        .game-btn { padding: 12px 28px; border: none; border-radius: 10px; font-weight: 700; font-size: 18px; font-family: inherit; cursor: pointer; transition: 0.3s; }
        .btn-cancel-main { background: #64748b; color: white; }
        .btn-submit-main { background: #10b981; color: white; }

        /* 📍 ดีไซน์ชุดกรอบสิทธิ์แจ้งเตือนกลางจอคุมโทนปุ่มมนสวย */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); color: #0f172a; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; justify-content: center; width: 100%; }
        .modal-btn-confirm { flex: 1; padding: 12px; background: #eab308; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-confirm:hover { background: #ca8a04; }
        .modal-btn-cancel { flex: 1; padding: 12px; background: #64748b; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-cancel:hover { background: #475569; }
        .modal-btn-single { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; transition: 0.2s; }
        .modal-btn-single:hover { background: #2563eb; }

                /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .game-container {
                width: 95% !important;
                padding: 20px 15px !important;
                margin: 10px auto !important;
                box-sizing: border-box !important;
            }
            .card-grid, .drop-grid {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }
            .item-pool {
                padding: 10px !important;
                gap: 8px !important;
            }
            .drag-item {
                font-size: 14px !important;
                padding: 8px 12px !important;
            }
            .drop-zone {
                min-height: 120px !important;
                padding: 12px !important;
            }
            .drop-title {
                font-size: 16px !important;
            }
            .memory-card {
                height: 80px !important;
                font-size: 13px !important;
                padding: 5px !important;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2 style="margin:0; font-size:24px;">🎮 เกมเศรษฐีจำลองการเลือกซื้อจัดสเปกคอม</h2>
            <span style="font-weight:700; font-size:22px; color:#3b82f6;" id="scoreTrack">ข้อที่ 1/3</span>
        </div>
        
        <div class="quest-box">
            <h3 style="margin:0 0 10px 0; font-size:18px; color:#1e293b;">โจทย์ภารกิจ:</h3>
            <p id="questDesc" style="margin:0; font-size:16px; color:#475569; line-height:1.6; font-weight:bold;"></p>
        </div>
        <div class="options-column" id="optionsContainer"></div>

        <div style="display:flex; justify-content:space-between;">
            <button class="game-btn btn-cancel-main" onclick="cancelGame()">ยกเลิกเกม</button>
            <button id="submitGameBtn" class="game-btn btn-submit-main" onclick="nextQuestion()" disabled>ยืนยันชิ้นส่วนอุปกรณ์</button>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div class="modal-content">
            <span id="modal-icon" style="font-size:70px; display:block; margin-bottom:15px;">❓</span>
            <h2 id="modal-title" style="margin:0 0 10px 0; font-size:24px; font-weight:700;">แจ้งเตือน</h2>
            <p id="modal-text" style="font-size:18px; color:#475569; margin-bottom:25px; line-height:1.6;"></p>
            <div class="modal-btn-group" id="modalBtnGroup"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loginUser = localStorage.getItem('userName');

        const currentUnit = 3;
        let currentStep = 0;
        let gameScore = 0;
        let selectedIdx = null;

        const stageQuests = [
            {
                desc: "ลูกค้าต้องการคอมพิวเตอร์ระดับสูงเพื่องานตัดต่อภาพและกราฟิกมืออาชีพ เน้นค่าสีที่เที่ยงตรงไม่เพี้ยน (Color Accuracy) ควรพิจารณาเลือกจอภาพที่มีคุณสมบัติตามข้อใด?",
                opts: ["A. หน้าจอความละเอียดสูง อัตรารีเฟรชเรท 240Hz โหมดเกมมิ่งจัดเต็ม", "B. หน้าจอที่เน้นค่าขอบเขตสีกว้างและมีค่าความเพี้ยนสีต่ำกว่า 2 (Delta E < 2)", "C. หน้าจอที่ระบุค่า Response Time ต่ำระดับ 0.5ms จอกระจกสะท้อนเงา"],
                ans: 1
            },
            {
                desc: "คอมพิวเตอร์ของลูกค้าใช้แหล่งจ่ายไฟ (PSU) ที่มีระบบจ่ายไฟนิ่งแบบ Active PFC และต้องการเลือกซื้อเครื่องสำรองไฟฟ้า (UPS) ที่ทำงานร่วมกันได้อย่างสมบูรณ์แบบที่สุด?",
                opts: ["A. UPS สเปกจ่ายคลื่นไฟฟ้าแบบดัดแปลง (Modified Sine Wave)", "B. UPS สเปกจ่ายคลื่นไฟฟ้าแบบสี่เหลี่ยม (Square Wave) ราคาประหยัด", "C. UPS สเปกที่จ่ายคลื่นไฟฟ้าแบบคลื่นบริสุทธิ์นิ่ง (Pure Sine Wave) เท่านั้น"],
                ans: 2
            },
            {
                desc: "ต้องการอัปเกรดระบบเพื่อใช้ลงระบบปฏิบัติการหลัก (OS) และโปรแกรมทำงานให้ลื่นไหล โดยมุ่งเน้นสเปกที่มีความทนทานและความเร็วที่คุ้มค่าสูงสุด?",
                opts: ["A. SSD ที่ใช้ชิปควบคุมประเภท TLC มี Controller และ DRAM Cache บนบอร์ด", "B. ฮาร์ดดิสก์จานหมุนความเร็วสูงรอบหมุน 7200 RPM แบบดั้งเดิม บัฟเฟอร์หนา", "C. SSD ราคาถูกสเปกชิปแบบ QLC ล้วน ไม่มี DRAM Cache คอยสลับข้อมูล"],
                ans: 0
            }
        ];

        function showQuest() {
            selectedIdx = null;
            document.getElementById('submitGameBtn').disabled = true;
            document.getElementById('scoreTrack').innerText = `ภารกิจข้อที่ ${currentStep + 1}/3`;
            const quest = stageQuests[currentStep];
            document.getElementById('questDesc').innerText = quest.desc;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            quest.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'spec-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.spec-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedIdx = idx;
                    document.getElementById('submitGameBtn').disabled = false;
                };
                container.appendChild(btn);
            });
        }

        async function nextQuestion() {
            if (selectedIdx === stageQuests[currentStep].ans) { gameScore += 33.4; }
            if (currentStep < 2) {
                currentStep++;
                showQuest();
            } else { await saveScore(); }
        }

        async function saveScore() {
            const finalPercent = Math.min(100, Math.round(gameScore));
            try {
                const userDocRef = db.collection("users").doc(loginUser);
                const docSnap = await userDocRef.get();
                let currentScores = docSnap.exists && docSnap.data().scores ? docSnap.data().scores : {};
                if (!currentScores["unit" + currentUnit]) currentScores["unit" + currentUnit] = { pre: 0, exercise: 0, post: 0 };
                currentScores["unit" + currentUnit].exercise = finalPercent;
                await userDocRef.update({ scores: currentScores });

                showModal("🎉", "วิเคราะห์สเปกสำเร็จ!", `บันทึกข้อมูลแบบฝึกหัดเรียบร้อย<br>ได้คะแนนความแม่นยำ: <b>${finalPercent}%</b>`, () => { window.location.href = '../index.html'; }, true);
            } catch(e) { window.location.href = '../index.html'; }
        }

        window.cancelGame = () => {
            showModal("❓", "ต้องการยกเลิกใช่ไหม?", "หากกดยืนยันออกจากเกม คะแนนจัดสเปกคอมของบทเรียนนี้จะไม่ถูกบันทึก !", () => { window.location.href = '../index.html'; });
        };

        function showModal(icon, title, text, action, isSingleBtn = false) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerHTML = text;
            const btnGroup = document.getElementById('modalBtnGroup');
            if(isSingleBtn) {
                btnGroup.innerHTML = `<button class="modal-btn-single" style="background:#10b981;">ตกลงกลับหน้าหลัก</button>`;
                btnGroup.firstChild.onclick = action;
            } else {
                btnGroup.innerHTML = `
                    <button class="modal-btn-confirm" id="modalConfirm">ยืนยันยกเลิก</button>
                    <button class="modal-btn-cancel" onclick="document.getElementById('game-modal').style.display='none'">เล่นต่อ</button>
                `;
                document.getElementById('modalConfirm').onclick = action;
            }
            document.getElementById('game-modal').style.display = 'flex';
        }
        showQuest();
    </script>
</body>
</html>
