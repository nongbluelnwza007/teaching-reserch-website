<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>KTCM Maintenance Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;700&display=swap');

        body {
            margin: 0;
            font-family: 'Outfit', 'Sarabun', sans-serif;
            background: #070913;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            background-image: radial-gradient(rgba(99, 102, 241, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
            color: #f1f5f9;
            overflow: hidden;
        }

        .login-card {
            background: rgba(19, 27, 46, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 380px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-8px);
            }

            40%,
            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .icon {
            font-size: 45px;
            margin-bottom: 12px;
            user-select: none;
        }

        h2 {
            color: #fff;
            margin: 0 0 6px 0;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin: 0 0 25px 0;
            font-size: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            width: 100%;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            background: rgba(11, 15, 25, 0.6);
            color: #f1f5f9;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.25);
            background: rgba(11, 15, 25, 0.8);
        }

        .input-group input[type="password"],
        .input-group input[type="text"] {
            padding-right: 48px;
            /* Leave space for toggle button */
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 18px;
            user-select: none;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #6366f1;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: #94a3b8;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .forgot-password-link {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .forgot-password-link:hover {
            color: #8b5cf6;
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
            filter: brightness(1.05);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .login-footer {
            margin-top: 25px;
            font-size: 13px;
            color: #64748b;
        }

        .login-footer span {
            color: #6366f1;
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 600;
        }

        .login-footer span:hover {
            color: #8b5cf6;
            text-decoration: underline;
        }

        /* Modal สไตล์เด้งกลางจอ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #131b2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 24px;
            text-align: center;
            width: 320px;
            transform: scale(0.75);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: #f1f5f9;
        }

        .modal-content.show {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 65px;
            margin-bottom: 12px;
            display: block;
        }

        .modal-btn {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
            width: auto;
            box-shadow: none;
        }

        .modal-btn:hover {
            background: #334155;
        }

        /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .login-card {
                width: 90% !important;
                padding: 35px 20px !important;
            }

            input,
            button {
                padding: 12px !important;
                font-size: 15px !important;
            }

            .modal-content {
                width: 85% !important;
                padding: 25px 20px !important;
            }
        }
    </style>
</head>

<body>
    <div class="login-card" id="loginCard">
        <div class="icon">🛠️</div>
        <h2>KTCM Login</h2>
        <p>Computer Maintenance System</p>

        <form id="loginForm" onsubmit="return false;">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                <span class="password-toggle" id="togglePassword">👁️</span>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>จดจำฉันไว้</span>
                </label>
                <span class="forgot-password-link" id="forgotPasswordBtn">ลืมรหัสผ่าน?</span>
            </div>

            <button type="submit" id="loginBtn">
                <div class="btn-content">
                    <span class="spinner" id="loginSpinner"></span>
                    <span id="btnText">ACCESS SYSTEM</span>
                </div>
            </button>
        </form>

        <div class="login-footer">
            ยังไม่มีบัญชีใช่หรือไม่? <span id="contactAdminBtn">ติดต่ออาจารย์ผู้สอน</span>
        </div>
    </div>

    <!-- Dynamic Modal System -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content" id="modalBox">
            <span id="modalIcon" class="modal-icon"></span>
            <div id="modalBody">
                <h2 id="modalText"></h2>
            </div>
            <button id="modalCloseBtn" class="modal-btn" style="display: none;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo",
            authDomain: "teach-af247.firebaseapp.com",
            projectId: "teach-af247",
            storageBucket: "teach-af247.firebasestorage.app",
            messagingSenderId: "540555116590",
            appId: "1:540555116590:web:23e79da0c82e8c865edfbf",
            measurementId: "G-52HK2DB5XS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Autofill saved Username if Remember Me was checked
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('rememberedUsername');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
                document.getElementById('rememberMe').checked = true;
                // Move cursor to password field automatically
                document.getElementById('password').focus();
            }
        });

        // Password Show/Hide Toggle Logic
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerText = type === 'password' ? '👁️' : '🙈';
        });

        // Shake Card Animation on Failure
        function shakeCard() {
            const card = document.getElementById('loginCard');
            card.classList.remove('shake');
            // Trigger reflow
            void card.offsetWidth;
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
        }

        // Show auto-dismissing Notification Modal
        function showNotification(isSuccess, message, redirect = false) {
            const modal = document.getElementById("modal");
            const modalBox = document.getElementById("modalBox");
            const icon = document.getElementById("modalIcon");
            const modalBody = document.getElementById("modalBody");
            const closeBtn = document.getElementById("modalCloseBtn");

            // Reset body structure for notification
            modalBody.innerHTML = `<h2 id="modalText">${message}</h2>`;
            icon.style.display = "block";
            icon.innerHTML = isSuccess ? "✅" : "❌";
            icon.style.color = isSuccess ? "#10b981" : "#ef4444";

            closeBtn.style.display = "none";

            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);

            setTimeout(() => {
                modalBox.classList.remove("show");
                setTimeout(() => {
                    modal.style.display = "none";
                    if (redirect) window.location.href = 'index.html';
                }, 300);
            }, 1500);
        }

        // Show Interactive Dialog Modal with Close Button
        function showInfoDialog(title, detailsHtml) {
            const modal = document.getElementById("modal");
            const modalBox = document.getElementById("modalBox");
            const icon = document.getElementById("modalIcon");
            const modalBody = document.getElementById("modalBody");
            const closeBtn = document.getElementById("modalCloseBtn");

            icon.style.display = "none";
            modalBody.innerHTML = `
                <div style="font-size: 50px; margin-bottom: 15px; user-select:none;">📞</div>
                <h3 style="margin: 0 0 15px 0; color:#fff; font-size: 22px; font-weight: 700;">${title}</h3>
                <div style="margin: 10px 0 15px 0; color:#94a3b8; font-size:15px; text-align: left; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                    ${detailsHtml}
                </div>
            `;

            closeBtn.style.display = "inline-block";
            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);
        }

        // Close Info Dialog on clicking close button or backdrop
        const modalCloseBtn = document.getElementById("modalCloseBtn");
        modalCloseBtn.addEventListener('click', () => {
            const modal = document.getElementById("modal");
            const modalBox = document.getElementById("modalBox");
            modalBox.classList.remove("show");
            setTimeout(() => modal.style.display = "none", 300);
        });

        document.getElementById("modal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("modal")) {
                if (modalCloseBtn.style.display === "inline-block") {
                    modalCloseBtn.click();
                }
            }
        });

        // Contact Info Click Handlers
        const contactDetailsHtml = `
            <p style="margin: 8px 0; font-size:14px;"><strong>อาจารย์ผู้สอน:</strong> นาย กันตพัฒน์ ตั้งกิตติธารา (อาจารย์บลู)</p>
            <p style="margin: 8px 0; font-size:14px;"><strong>ห้องพักครู:</strong>อาคารเทคโนโลยีธุรกิจดิจิทัล (KTCM)</p>
            <p style="margin: 8px 0; font-size:14px;"><strong>อีเมล:</strong>66030010@kmitl.ac.th</p>
            <p style="margin: 12px 0 0 0; font-size:13px; color:#64748b; font-style: italic;">* กรุณาแจ้งรหัสนักศึกษาและปัญหาในการลงทะเบียนหรือเข้าสู่ระบบ</p>
        `;

        document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
            showInfoDialog("ลืมรหัสผ่าน?", `
                <p style="margin: 5px 0 15px 0;">ระบบจัดการเรียนการสอนไม่เปิดให้แก้ไขรหัสผ่านได้ด้วยตนเอง</p>
                ${contactDetailsHtml}
            `);
        });

        document.getElementById('contactAdminBtn').addEventListener('click', () => {
            showInfoDialog("ติดต่อเจ้าหน้าที่ระบบ", contactDetailsHtml);
        });

        // Submit & Auth Logic
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!user || !pass) {
                showNotification(false, "กรอกข้อมูลให้ครบ !");
                shakeCard();
                return;
            }

            // Enable loading state
            loginBtn.disabled = true;
            loginSpinner.style.display = "inline-block";
            btnText.innerText = "กำลังเข้าสู่ระบบ...";

            try {
                const docSnap = await getDoc(doc(db, "users", user));
                if (docSnap.exists() && docSnap.data().password === pass) {
                    const data = docSnap.data();

                    sessionStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', user);
                    localStorage.setItem('firstName', data.firstName);
                    localStorage.setItem('lastName', data.lastName);

                    // Remember Me logic
                    if (rememberMe) {
                        localStorage.setItem('rememberedUsername', user);
                    } else {
                        localStorage.removeItem('rememberedUsername');
                    }

                    showNotification(true, "ยินดีต้อนรับ !", true);
                } else {
                    showNotification(false, "ชื่อหรือรหัสผ่านผิด!");
                    shakeCard();
                    // Reset loading state
                    loginBtn.disabled = false;
                    loginSpinner.style.display = "none";
                    btnText.innerText = "ACCESS SYSTEM";
                }
            } catch (error) {
                showNotification(false, "เชื่อมต่อ Cloud ไม่ได้");
                shakeCard();
                // Reset loading state
                loginBtn.disabled = false;
                loginSpinner.style.display = "none";
                btnText.innerText = "ACCESS SYSTEM";
            }
        });
    </script>
</body>

</html>
